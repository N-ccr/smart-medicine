<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>注册账号 - 智慧医药咨询系统</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">
    <style>
        .register-panel { scroll-margin-top: 5rem; }
        .register-card {
            border: 1px solid rgba(32, 64, 102, 0.08);
        }
        .register-panel .form-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #204066;
            margin-top: 1.35rem;
            margin-bottom: 0.65rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid rgba(32, 64, 102, 0.1);
        }
        .register-panel .form-section-title:first-child { margin-top: 0; }
        .register-panel .form-label { font-size: 0.875rem; color: #5a6c7d; margin-bottom: 0.25rem; }
        .main_header_area .header_menu { display: none !important; }
        .main_header_area .topbar-wrap { display: none !important; }
        #register { margin-top: 1rem; }
    </style>
</head>
<body class="home-3">

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="common/common-bar::#header"></div>

<section id="register" class="appointment register-panel bg-sfgrey-3 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-xl-6">
                <div class="register-card bg-white rounded-3 shadow-sm p-4 p-md-5">
                    <h2 class="h4 text-center mb-2 fw-semibold" style="color:#204066;">创建账号</h2>

                    <div class="appoint-form mb-xs-0">
                        <div class="form-section-title">账号与安全</div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="userAccount" class="form-label">登录用户名</label>
                                <input id="userAccount" type="text" class="form-control" autocomplete="username"/>
                            </div>
                            <div class="col-md-6">
                                <label for="userPwd" class="form-label">登录密码</label>
                                <input id="userPwd" type="password" class="form-control" maxlength="16" autocomplete="new-password"/>
                            </div>
                        </div>

                        <div class="form-section-title">基本信息</div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="userName" class="form-label">姓名 / 昵称</label>
                                <input id="userName" type="text" class="form-control" maxlength="10"
                                       autocomplete="name"/>
                            </div>
                            <div class="col-md-6">
                                <label for="userSex" class="form-label">性别</label>
                                <select id="userSex" class="niceSelect w-100">
                                    <option selected value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="userAge" class="form-label">年龄</label>
                                <input id="userAge" type="number" class="form-control" min="1" max="120"
                                       inputmode="numeric" autocomplete="off"/>
                            </div>
                        </div>

                        <div class="form-section-title">联系方式与验证</div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="userTel" class="form-label">手机号</label>
                                <input id="userTel" type="tel" class="form-control" maxlength="11"
                                       inputmode="numeric" autocomplete="tel"/>
                            </div>
                            <div class="col-md-6">
                                <label for="userEmail" class="form-label">邮箱</label>
                                <input id="userEmail" type="email" class="form-control" autocomplete="email"/>
                            </div>
                            <div class="col-12">
                                <label for="code" class="form-label">邮箱验证码</label>
                                <div class="input-group">
                                    <input id="code" type="text" class="form-control" maxlength="10" autocomplete="one-time-code"/>
                                    <button type="button" id="email-code" class="btn btn-na px-3" onclick="sendEmailCode()">获取验证码</button>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="button" onclick="register()" class="btn btn-primary btn-lg py-2">完成注册</button>
                        </div>
                        <p class="text-center text-muted small hint-login mt-3 mb-0">已有账号？请使用页面顶部「登录」，或 <a href="index.html">返回首页</a>。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="common/common-bar::#footer"></div>

<div th:replace="common/common-bar::#search"></div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-swiper.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>
</body>
</html>
